version: "3.8"

services:
  db:
    image: postgres:16
    container_name: postgres_db
    restart: always
    ulimits:
      nproc: 65535
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydatabase"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - anvil_network

  app:
    build: .
    container_name: node_app
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=100
      - DATABASE_URL=postgresql://myuser:mypassword@db:5432/mydatabase?schema=public
      - REDIS_HOST=redis_db
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      redis_db:
        condition: service_healthy

    networks:
      - anvil_network

  prisma_studio:
    image: node:22-alpine
    container_name: prisma_studio
    working_dir: /app
    restart: always
    environment:
      - DATABASE_URL=postgresql://myuser:mypassword@db:5432/mydatabase?schema=public
    volumes:
      - .:/app
    ports:
      - "5555:5555"
    command: npx prisma studio --config=./src/prisma.config.ts --port 5555 --browser none
    depends_on:
      db:
        condition: service_healthy
    networks:
      - anvil_network

  redis_db:
    image: redis:7-alpine
    container_name: redis_db
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - anvil_network

volumes:
  postgres_data:

networks:
  anvil_network:
    driver: bridge
